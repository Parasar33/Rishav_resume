<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="RP logo">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="72" ry="72" fill="url(#g)"/>

  <!-- Subtle inner panel -->
  <rect x="48" y="48" width="416" height="416" rx="60" ry="60" fill="rgba(255,255,255,0.06)"/>

  <!-- Monogram -->
  <text x="50%" y="56%" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="200" fill="#ffffff" filter="url(#glow)">RP</text>

  <!-- Small accent ring -->
  <circle cx="410" cy="100" r="28" fill="rgba(255,255,255,0.12)"/>
  <circle cx="410" cy="100" r="18" fill="#ffffff" opacity="0.08"/>
</svg>